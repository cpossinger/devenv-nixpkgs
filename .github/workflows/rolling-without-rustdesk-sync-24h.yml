name: rolling-without-rustdesk-sync-24h

on:
  schedule:
    - cron: '0 4 * * *' # 4 AM UTC to avoid high-traffic peaks
  workflow_dispatch:

permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with Blobless Filter
        uses: actions/checkout@v4
        with:
          ref: 'rolling-without-rustdesk'
          filter: blob:none
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with Upstream
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git remote get-url upstream &>/dev/null; then
            git remote set-url upstream https://github.com/cachix/devenv-nixpkgs.git
          else
            git remote add upstream https://github.com/cachix/devenv-nixpkgs.git
          fi

          git fetch upstream rolling --quiet

          # Capture pre-rebase SHA so we can reliably restore workflow files afterward
          PRE_REBASE_SHA=$(git rev-parse HEAD)

          if ! git rebase --quiet -X theirs upstream/rolling; then
            echo "::error::Rebase failed -- resolve conflicts manually and re-run."
            git rebase --abort
            exit 1
          fi

          # Restore local workflow files to avoid push rejection:
          # GITHUB_TOKEN cannot update .github/workflows/** via rebase; restore from pre-rebase commit
          if ! git checkout "$PRE_REBASE_SHA" -- .github/workflows; then
            echo "::warning::Could not restore .github/workflows from pre-rebase commit; skipping."
          fi

          # If restoring workflows produced staged changes, commit them before pushing
          if ! git diff --cached --quiet; then
            git commit -m "Keep local GitHub Actions workflows during upstream sync"
          fi

          git push origin rolling-without-rustdesk --force-with-lease
