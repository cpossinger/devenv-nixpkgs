name: rolling-without-rustdesk-sync-24h

on:
  schedule:
    - cron: '0 4 * * *' # 4 AM UTC to avoid high-traffic peaks
  workflow_dispatch:

permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with Blobless Filter
        uses: actions/checkout@v4
        with:
          ref: 'rolling-without-rustdesk'
          filter: blob:none
          fetch-depth: 0 
          persist-credentials: true

      - name: Sync with Upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git remote add upstream https://github.com/cachix/devenv-nixpkgs.git
          
          git fetch upstream rolling --quiet

          git rebase --quiet -X theirs upstream/rolling

          git push origin rolling-without-rustdesk --force-with-lease
